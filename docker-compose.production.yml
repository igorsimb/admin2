services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: admin2
      POSTGRES_USER: admin2
      POSTGRES_PASSWORD: admin2password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin2"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  django:
    build: .
    command: uv run gunicorn main:app --bind 0.0.0.0:8000 --workers 4
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  celery:
    build: .
    command: uv run celery -A core worker -l info
    volumes:
      - .:/app
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:alpine
    ports:
      - "6378:6379"
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
    environment:
      PORT_NGINX: 8061
      PORT_WEB: 8000
    ports:
      - "8061:8061"
    depends_on:
      - django
    command: /bin/sh -c "envsubst '$$PORT_NGINX $$PORT_WEB' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"

volumes:
  static_volume:
  media_volume:
  redis_data_prod:
  postgres_data: 